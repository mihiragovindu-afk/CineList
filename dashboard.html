<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineList</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    display: flex;
}

/* Sidebar */
.sidebar {
    width: 230px;
    background: #020617;
    height: 100vh;
    padding: 20px;
}

.sidebar h2 {
    text-align: center;
}

.sidebar a {
    display: block;
    padding: 12px;
    margin: 10px 0;
    color: #cbd5f5;
    text-decoration: none;
}

.sidebar a:hover {
    background: #1e293b;
}

/* Main */
.main {
    flex: 1;
    padding: 20px;
}

/* Sections */
.section { display: none; }
.active { display: block; }

/* Movies */
.movies {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
}

.card {
    width: 220px;
    background: #1e293b;
    border-radius: 10px;
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 300px;
}

.card h3 {
    margin: 10px;
}

.card select, .card button {
    margin: 5px 10px;
    padding: 5px;
    width: 90%;
}

/* Watchlist */
.watchlist {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
}

/* Create */
.create-box {
    width: 300px;
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}
</style>

<script>
let watchlists = [];
let activeWatchlistId = null;

function showSection(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

async function createWatchlist() {
    const name = document.getElementById('wlName').value.trim();
    if (!name) {
        alert('Enter a watchlist name');
        return;
    }

    const response = await fetch('/api/watchlists/create/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name})
    });

    if (response.ok) {
        document.getElementById('wlName').value = '';
        await loadWatchlists();
        alert('Watchlist created successfully');
    } else {
        const data = await response.json();
        alert(data.error || 'Could not create watchlist');
    }
}

async function loadWatchlists() {
    const response = await fetch('/api/watchlists/');
    const data = await response.json();

    watchlists = data.watchlists || [];
    renderWatchlists();

    if (!activeWatchlistId && watchlists.length > 0) {
        setActiveWatchlist(watchlists[0].id);
    } else if (activeWatchlistId) {
        const exists = watchlists.some(wl => wl.id === activeWatchlistId);
        if (!exists) {
            activeWatchlistId = watchlists.length ? watchlists[0].id : null;
        }
    }
}

function renderWatchlists() {
    const container = document.getElementById('watchlists');
    container.innerHTML = '';

    if (watchlists.length === 0) {
        container.innerHTML = '<p style="color:#cbd5f5;">No watchlists yet. Create one to start.</p>';
        document.getElementById('watchlist-details').innerHTML = '';
        return;
    }

    watchlists.forEach(wl => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
            <h3>${wl.name}</h3>
            <button onclick="setActiveWatchlist(${wl.id})" style="margin:0 10px 10px 10px;">View</button>
            <button onclick="renameWatchlist(${wl.id})" style="margin:0 10px 10px 10px;">Rename</button>
            <button onclick="deleteWatchlist(${wl.id})" style="margin:0 10px 10px 10px; background:#ff4444;">Delete</button>
        `;
        if (activeWatchlistId === wl.id) {
            div.style.border = '2px solid #e50914';
        }
        container.appendChild(div);
    });
}

async function setActiveWatchlist(id) {
    activeWatchlistId = id;
    loadWatchlistMovies(id);
    renderWatchlists();
}

async function loadWatchlistMovies(watchlistId) {
    const response = await fetch(`/api/watchlists/${watchlistId}/movies/`);
    const data = await response.json();

    const details = document.getElementById('watchlist-details');
    if (!response.ok) {
        details.innerHTML = '<p style="color:#f88;">Could not load watchlist movies.</p>';
        return;
    }

    const movies = data.movies || [];
    const listHtml = movies.length
        ? movies.map(movie => `
            <div style="background:#111827; padding:12px; border-radius:10px; margin-bottom:10px; display:flex; gap:10px; align-items:center;">
                <img src="${movie.poster}" width="80" style="border-radius:8px; object-fit:cover;">
                <div>
                    <strong>${movie.title}</strong><br>
                    ${movie.status || 'Status unknown'}<br>
                    ${movie.rating ? 'Rating: ' + movie.rating : ''}
                </div>
            </div>
        `).join('')
        : '<p style="color:#cbd5f5;">This watchlist has no movies yet.</p>';

    details.innerHTML = `
        <h3 style="margin-top:20px;">Watchlist details</h3>
        <div>${watchlists.find(wl => wl.id === watchlistId)?.name || ''}</div>
        <div style="margin-top: 15px;">${listHtml}</div>
    `;
}

async function renameWatchlist(watchlistId) {
    const current = watchlists.find(wl => wl.id === watchlistId);
    if (!current) return;

    const name = prompt('New watchlist name:', current.name);
    if (!name || !name.trim()) return;

    const response = await fetch(`/api/watchlists/${watchlistId}/`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name: name.trim()})
    });

    if (response.ok) {
        await loadWatchlists();
        alert('Watchlist renamed');
    } else {
        const data = await response.json();
        alert(data.error || 'Could not rename watchlist');
    }
}

async function deleteWatchlist(watchlistId) {
    if (!confirm('Delete this watchlist?')) return;
    const response = await fetch(`/api/watchlists/${watchlistId}/`, {
        method: 'DELETE'
    });

    if (response.ok) {
        if (activeWatchlistId === watchlistId) {
            activeWatchlistId = null;
        }
        await loadWatchlists();
        alert('Watchlist deleted');
    } else {
        const data = await response.json();
        alert(data.error || 'Could not delete watchlist');
    }
}
</script>

</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>🎬 CineList</h2>
    <p id="username-display" style="color: #cbd5f5; font-size: 12px; text-align: center; margin-top: 10px;"></p>
    <a onclick="showSection('movies')"><i class="fa fa-film"></i> Movies</a>
    <a onclick="showSection('watchlist')"><i class="fa fa-list"></i> Watchlists</a>
    <a onclick="showSection('create')"><i class="fa fa-plus"></i> New Watchlist</a>
</div>

<!-- Main -->
<div class="main">

<!-- Movies -->
<div id="movies" class="section active">
<h2>Search Movies</h2>
<div style="margin-bottom: 20px;">
    <input id="search-input" type="text" placeholder="Search movies...">
    <button onclick="searchMovies()" style="padding: 10px 20px; background: #e50914; color: white; border: none; cursor: pointer; margin-left: 5px;">Search</button>
</div>
<div id="search-results" style="display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px;"></div>
<h3>Popular Movies</h3>
<div class="movies">

<div class="card">
<img src="https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg">
<h3>Inception</h3>
<button onclick="addToWatchlist('tt1375666','Inception','2010','https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg')">Add to Watchlist</button>
</div>

<div class="card">
<img src="https://image.tmdb.org/t/p/w500/rAiYTfKGqDCRIIqo664sY9XZIvQ.jpg">
<h3>Interstellar</h3>
<button onclick="addToWatchlist('tt0816692','Interstellar','2014','https://image.tmdb.org/t/p/w500/rAiYTfKGqDCRIIqo664sY9XZIvQ.jpg')">Add to Watchlist</button>
</div>

</div>
</div>

<!-- Watchlists -->
<div id="watchlist" class="section">
<h2>Your Watchlists</h2>
<div id="watchlists" class="watchlist"></div>
<div id="watchlist-details" style="margin-top: 20px;"></div>
</div>

<!-- Create -->
<div id="create" class="section">
<h2>Create Watchlist</h2>
<div class="create-box">
<input id="wlName" placeholder="Watchlist Name">
<button onclick="createWatchlist()">Create</button>
</div>
</div>

</div>

<script>
// Show username on dashboard
const username = localStorage.getItem('username');
const user_id = localStorage.getItem('user_id');

if (!user_id) {
    window.location.href = '/login/';
}

document.addEventListener('DOMContentLoaded', function() {
    const nameEl = document.getElementById('username-display');
    if (nameEl) nameEl.innerText = 'Welcome, ' + (username || 'User') + '!';

    loadWatchlists();
});

async function addToWatchlist(imdb_id, title, year, poster) {
    if (!activeWatchlistId) {
        alert('Select or create a watchlist first.');
        return;
    }

    const response = await fetch('/api/watchlists/add-movie/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            imdb_id,
            title,
            year,
            poster_url: poster,
            watchlist_id: activeWatchlistId
        })
    });

    const data = await response.json();
    if (response.ok) {
        alert(data.message);
        await loadWatchlistMovies(activeWatchlistId);
    } else {
        alert(data.error || 'Could not add movie');
    }
}

async function searchMovies() {
    const query = document.getElementById('search-input').value.trim();
    if (!query) {
        alert('Enter a search term');
        return;
    }

    const response = await fetch(`/api/search/?q=${encodeURIComponent(query)}`);
    const data = await response.json();

    const resultsDiv = document.getElementById('search-results');
    resultsDiv.innerHTML = '';

    const movies = data.results || [];
    if (movies.length === 0) {
        resultsDiv.innerHTML = '<p style="color:#cbd5f5;">No results found.</p>';
        return;
    }

    movies.forEach(movie => {
        resultsDiv.innerHTML += `
            <div style="background:#111827; padding:12px; border-radius:10px; width:240px;">
                <img src="${movie.Poster}" width="100%" style="border-radius:8px; object-fit:cover; margin-bottom:10px;">
                <p><strong>${movie.Title}</strong></p>
                <p>${movie.Year}</p>
                <button onclick="addToWatchlist('${movie.imdbID}', '${movie.Title}', '${movie.Year}', '${movie.Poster}')" style="padding:8px 12px; background:#e50914; color:white; border:none; border-radius:6px; cursor:pointer;">+ Add to Watchlist</button>
            </div>
        `;
    });
}
</script>

</body>
</html>
